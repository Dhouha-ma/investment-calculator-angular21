<div class="calculator-container">
  <form [formGroup]="calculatorForm()">
    <div class="inputs-container">
      <app-input type="text" placeholder="Initial Investment" formControlName="initialInvestment" />
      <app-input type="text" placeholder="Annual Investment" formControlName="annualInvestment" />
      <app-input type="text" placeholder="Expected return" formControlName="expectedReturn" />
      <app-input type="text" placeholder="Duration" formControlName="duration" />
    </div>

    <app-button
      label="Calculate"
      type="submit"
      (clicked)="handleClick()"
      [disabled]="calculatorForm().invalid"
    />
  </form>
</div>
