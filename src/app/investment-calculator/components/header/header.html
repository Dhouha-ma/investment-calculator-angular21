<h1 class="center">Investment Calculator</h1>

<div class="calculator-container">
  <form [formGroup]="calculatorForm">
    <div class="inputs-container">
      <app-input
        type="text"
        placeholder="Initial Investment"
        formControlName="initialInvestment"
        (changed)="handleInput($event)"
      />

      <app-input
        type="text"
        placeholder="Annual Investment"
        formControlName="annualInvestment"
        (changed)="handleInput($event)"
      />

      <app-input
        type="text"
        placeholder="Expected return"
        formControlName="expectedReturn"
        (changed)="handleInput($event)"
      />

      <app-input
        type="text"
        placeholder="Duration"
        formControlName="duration"
        (changed)="handleInput($event)"
      />
    </div>

    <app-button label="Calculate" type="submit" (clicked)="handleClick()" />
  </form>
</div>

<app-calculation-result [results]="results()"></app-calculation-result>
